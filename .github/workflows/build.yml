name: Build Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Find and Build Mod
        run: |
          # 1. Find the folder that actually contains gradlew
          GRADLEW_PATH=$(find . -name gradlew -print -quit)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: Could not find gradlew file anywhere in the repository!"
            exit 1
          fi
          
          # 2. Move into that folder
          cd $(dirname "$GRADLEW_PATH")
          echo "Found Minecraft project in: $(pwd)"
          
          # 3. Give permission and build
          chmod +x gradlew
          ./gradlew build --no-daemon
          
      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: Chaos-Mod-Jar
          path: "**/build/libs/*.jar"
