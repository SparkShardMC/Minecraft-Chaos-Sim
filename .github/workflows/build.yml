name: Build Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Find and Build
        run: |
          # This command finds where gradlew is and moves there
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          GRADLE_DIR=$(dirname $GRADLEW_PATH)
          cd $GRADLE_DIR
          
          echo "Found gradlew in $GRADLE_DIR, starting build..."
          chmod +x gradlew
          ./gradlew build --no-daemon
          
      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: Chaos-Mod-Jar
          # This searches for the jar no matter where it was built
          path: "**/build/libs/*.jar"
