name: Build Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Force Build with Settings Fix
        run: |
          # 1. Find the project folder
          PROJECT_DIR=$(find . -name "build.gradle" -exec dirname {} \;)
          cd $PROJECT_DIR
          
          # 2. CREATE THE MISSING SETTINGS FILE (This fixes the IMG_0069 error)
          echo "pluginManagement { repositories { maven { url 'https://maven.fabricmc.net/' }; gradlePluginPortal() } }" > settings.gradle
          echo "rootProject.name = 'chaos-mod'" >> settings.gradle

          # 3. Install Gradle and Build
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          ./gradle-8.9/bin/gradle build --no-daemon
          
      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: Chaos-Mod-Jar
          path: "**/build/libs/*.jar"
