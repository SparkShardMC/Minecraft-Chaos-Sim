name: Build Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Force Install Gradle Wrapper
        run: |
          # 1. Find where your project lives
          PROJECT_DIR=$(find . -name "build.gradle" -exec dirname {} \;)
          cd $PROJECT_DIR
          echo "Building in: $(pwd)"
          
          # 2. This fixes the "Missing JAR" error by installing a fresh Gradle
          wget https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          export PATH=$PATH:$(pwd)/gradle-8.9/bin
          
          # 3. Use the fresh Gradle to build the mod
          gradle build --no-daemon
          
      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: Chaos-Mod-Jar
          path: "**/build/libs/*.jar"
