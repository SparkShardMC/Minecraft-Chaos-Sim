plugins {
    id "fabric-loom" version "1.9-SNAPSHOT"
}

version = "1.0.0"
group = "com.sparkshard.chaos"

repositories {
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://www.cursemaven.com" }
    maven { url "https://maven.terraformersmc.com/releases/" }
    mavenCentral()
}

dependencies {
    // UPDATED FOR 1.21.4 (Latest Stable)
    minecraft "com.mojang:minecraft:1.21.4"
    mappings "net.fabricmc:yarn:1.21.4+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.113.0+1.21.4"

    // GeckoLib (1.21.4 compatible)
    modImplementation "curse.maven:geckolib-388172:5943793"

    // Weather, Storms & Tornadoes + CoroUtil
    modImplementation "curse.maven:weather-storms-tornadoes-237333:5603539"
    modImplementation "curse.maven:coroutil-237749:5589020"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
