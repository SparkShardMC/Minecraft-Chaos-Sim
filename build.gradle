plugins {
    id "fabric-loom" version "1.9-SNAPSHOT"
}

version = "1.0.0"
group = "com.sparkshard.chaos"

repositories {
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://www.cursemaven.com" }
    maven { url "https://maven.terraformersmc.com/releases/" }
    mavenCentral()
}

dependencies {
    // TARGETING 1.21.11
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.113.0+1.21.11"

    // GeckoLib (Latest for 1.21.x)
    modImplementation "curse.maven:geckolib-388172:5943793"

    // Weather & CoroUtil
    modImplementation "curse.maven:weather-storms-tornadoes-237333:5603539"
    modImplementation "curse.maven:coroutil-237749:5589020"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
