plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}

version = "1.0.0"
group = "com.sparkshard.chaos"

repositories {
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://maven.curseforge.com" }
    maven { url "https://jitpack.io" }
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:1.21"
    mappings "net.fabricmc:yarn:1.21+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21"
    modImplementation "software.bernie.geckolib:geckolib-fabric-1.21.1:4.5.2"

    // This is the specific line that tells GitHub how to find the Tornado mod
    // Format: curse.maven:<plugin-name>-<project-id>:<file-id>
    modImplementation "curse.maven:weather-storms-tornadoes-237333:5600000"
}

    // Fabric API (Required for most mods)
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21"

    // --- THE DISASTER ENGINE ---
    // This connects your mod to "Weather & Tornadoes Remastered"
    // The numbers at the end (237333:5555555) are the Project ID and File ID for the mod
    modImplementation "curse.maven:weather-storms-tornadoes-237333:5600000" 
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archivesBaseName}" }
    }
}
