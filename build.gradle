plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}

version = "1.0.0"
group = "com.sparkshard.chaos"

repositories {
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://maven.curseforge.com" }
    maven { url "https://jitpack.io" }
    maven { url "https://www.cursemaven.com" } // Fixed CurseMaven URL
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:1.21"
    mappings "net.fabricmc:yarn:1.21+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21"

    // GeckoLib (Animations)
    modImplementation "software.bernie.geckolib:geckolib-fabric-1.21.1:4.5.2"

    // Weather, Storms & Tornadoes (CurseForge ID: 237333)
    modImplementation "curse.maven:weather-storms-tornadoes-237333:5600000"
}
