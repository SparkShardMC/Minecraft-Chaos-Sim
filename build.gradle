plugins {
    id "fabric-loom" version "1.7-SNAPSHOT"
    id "maven-publish"
}

version = "1.0.0"
group = "com.sparkshard.chaos"

repositories {
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://www.cursemaven.com" }
    maven { url "https://maven.terraformersmc.com/releases/" }
    maven { url "https://jitpack.io" }
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:1.21"
    mappings "net.fabricmc:yarn:1.21+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21"

    // GeckoLib (Required for FBI/Mafia animations)
    // Project ID: 388172 | File ID: 5681144
    modImplementation "curse.maven:geckolib-388172:5681144"

    // Weather, Storms & Tornadoes (The Chaos)
    // Project ID: 237333 | File ID: 5603539
    modImplementation "curse.maven:weather-storms-tornadoes-237333:5603539"
    
    // CoroUtil (Required by the Weather Mod to actually run)
    modImplementation "curse.maven:coroutil-237749:5589020"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}
